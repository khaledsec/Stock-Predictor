<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Stock Predictor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-gray-800 p-8 rounded-lg shadow-2xl">
        <h2 class="text-3xl font-bold text-center text-blue-400 mb-6">Stock Predictor</h2>
        <h3 class="text-xl font-semibold text-center mb-6">Create an Account</h3>
        
        <div class="space-y-4">
            <input type="text" id="username" placeholder="Choose a Username" class="w-full p-3 rounded bg-gray-700 border border-gray-600 focus:outline-none focus:border-blue-500">
            <input type="password" id="password" placeholder="Choose a Password" class="w-full p-3 rounded bg-gray-700 border border-gray-600 focus:outline-none focus:border-blue-500">
            
            <button onclick="handleRegister()" class="w-full bg-gray-600 hover:bg-gray-700 p-3 rounded font-bold transition mt-4">Register</button>
            
            <p id="auth-message" class="text-center text-red-400 text-sm mt-4 min-h-[20px]"></p>
            
            <div class="text-center mt-4">
                <p class="text-sm text-gray-400">Already have an account? 
                    <a href="login.html" class="text-blue-400 hover:underline">Login here</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = "http://localhost:8000";

        async function handleRegister() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const msgBox = document.getElementById('auth-message');

            //  1. Check law el khana fadya
            if (!username || !password) {
                msgBox.style.color = "#f87171";
                msgBox.innerText = "Please enter both fields.";
                return;
            }

            // 2. Check Username length
            if (username.length < 3) {
                msgBox.style.color = "#f87171";
                msgBox.innerText = "Username must be at least 3 characters long.";
                return;
            }

            //  3. Check Password length
            if (password.length < 8) {
                msgBox.style.color = "#f87171";
                msgBox.innerText = "Password must be at least 8 characters long.";
                return;
            }

            //4. Check law el Password feeh raqam (using Regular Expression)
            if (!/\d/.test(password)) {
                msgBox.style.color = "#f87171";
                msgBox.innerText = "Password must contain at least one number.";
                return;
            }

            try {
                msgBox.style.color = "#60a5fa";
                msgBox.innerText = "Registering...";
                
                const response = await fetch(`${API_BASE_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    msgBox.style.color = "#34d399";
                    msgBox.innerText = "Account created successfully! Redirecting to login...";
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000); 
                } else {
                    msgBox.style.color = "#f87171";
                    msgBox.innerText = data.detail || "Error occurred.";
                }
            } catch (err) {
                msgBox.style.color = "#f87171";
                msgBox.innerText = "Cannot connect to server.";
            }
        }
    </script>
</body>
</html>
